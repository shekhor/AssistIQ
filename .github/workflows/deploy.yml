name: Deploy AssistIQ

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Terraform (provision infrastructure)
  # ─────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/

    outputs:
      backend_app_name: ${{ steps.tf_output.outputs.backend_app_name }}
      frontend_api_key: ${{ steps.tf_output.outputs.frontend_api_key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

      - name: Get Terraform Outputs
        if: github.ref == 'refs/heads/main'
        id: tf_output
        run: |
          echo "backend_app_name=$(terraform output -raw backend_app_name)" >> $GITHUB_OUTPUT
          echo "frontend_api_key=$(terraform output -raw frontend_api_key)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # JOB 2 — Build & Deploy React Frontend
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: terraform
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: AssistIQ-FE/package-lock.json

      - name: Install dependencies
        working-directory: AssistIQ-FE/
        run: npm ci

      - name: Build React app
        working-directory: AssistIQ-FE/
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.terraform.outputs.frontend_api_key }}
          action: upload
          app_location: AssistIQ-FE/
          output_location: dist/

  # ─────────────────────────────────────────
  # JOB 3 — Build & Deploy .NET Backend
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: terraform
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        working-directory: AssistIQ-BE/
        run: dotnet restore

      - name: Build
        working-directory: AssistIQ-BE/
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        working-directory: AssistIQ-BE/
        run: dotnet test --no-restore --verbosity normal

      - name: Publish
        working-directory: AssistIQ-BE/
        run: dotnet publish --configuration Release --output ./publish

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.terraform.outputs.backend_app_name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: AssistIQ-BE/publish